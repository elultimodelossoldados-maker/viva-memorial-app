[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

# For Next.js static export with trailingSlash: true
# Each page generates its own index.html - no catch-all needed
# But we do need 404 handling
[[redirects]]
  from = "/404"
  to = "/404.html"
  status = 404